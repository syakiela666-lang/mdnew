<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD-Text</title>
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="theme-color" content="#0066CC">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX for LaTeX Math support (like $\rightarrow$) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <!-- Custom CSS -->
  <script type="module" crossorigin src="/assets/index-ngSl5ZY7.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BwhmLZSa.css">
</head>
<body>

    <!-- HOME VIEW (List Materi) -->
    <main id="home-view" class="view active">
        <!-- Top Navigation / Category Filter -->
        <header class="home-topbar">
            <div class="category-filter-wrapper">
                <select id="category-filter" aria-label="Filter Kategori">
                    <option value="all">All Categories</option>
                    <!-- Kategori akan di-inject JS -->
                </select>
                <button id="settings-btn" class="manage-btn" aria-label="Pengaturan">⚙️</button>
            </div>
        </header>

        <!-- Add Button (Floating) -->
        <button id="add-lesson-btn" class="fab-btn" aria-label="Tambah Materi">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <section class="lesson-container">
            <ul id="lesson-list" class="lesson-list">
                <!-- Lesson cards will be injected here by JS -->
            </ul>
        </section>
    </main>

    <!-- READING VIEW (Isi Materi) -->
    <main id="reading-view" class="view">
        <header class="reading-header">
            <button id="back-btn" class="back-btn" aria-label="Kembali">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="reading-title" class="reading-title">Judul Materi</h2>
            <button id="copy-lesson-btn" class="edit-btn" aria-label="Copy Materi" style="margin-right: 8px; color: var(--text-secondary);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
            <button id="delete-lesson-btn" class="edit-btn" aria-label="Hapus Materi" style="margin-right: 8px; color: #ff4444;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
            <button id="edit-lesson-btn" class="edit-btn" aria-label="Edit Materi">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
            </button>
        </header>

        <article id="lesson-content" class="markdown-body">
            <!-- Markdown content will be injected here -->
        </article>
    </main>

    <!-- EDITOR VIEW (Form Tambah Materi) -->
    <main id="editor-view" class="view">
        <header class="reading-header">
            <button id="editor-cancel-btn" class="back-btn" aria-label="Batal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <h2 class="reading-title">Add Note</h2>
            <button id="editor-save-btn" class="save-btn">Save</button>
        </header>

        <section class="editor-container">
            <div class="form-group">
                <label for="input-category">Categories</label>
                <select id="input-category">
                    <!-- Kategori akan di-inject JS -->
                </select>
            </div>

            <div class="form-group">
                <label for="input-title">Title</label>
                <input type="text" id="input-title" placeholder="Contoh: Pengenalan Candlestick" required>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <button type="button" id="select-all-btn" style="padding: 4px 12px; font-size: 13px; font-weight: 500; border-radius: 6px; background: var(--text-secondary, #6c757d); color: white; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 3h7v7M14 21h7v-7M3 14v7h7M3 10V3h7"></path>
                        </svg>
                        Select All
                    </button>
                    <button type="button" id="paste-content-btn" style="padding: 4px 12px; font-size: 13px; font-weight: 500; border-radius: 6px; background: var(--primary-color, #0066CC); color: white; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Paste
                    </button>
                </div>
                <textarea id="input-content" rows="15" placeholder="Type Here" spellcheck="false" required></textarea>
            </div>
        </section>
    </main>

    <!-- SETTINGS VIEW -->
    <main id="settings-view" class="view">
        <header class="reading-header">
            <button id="settings-back-btn" class="back-btn" aria-label="Kembali">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 class="reading-title">Pengaturan</h2>
        </header>

        <section class="settings-container">
            <!-- UI Scale Settings -->
            <div class="settings-section">
                <h3>Ukuran Tampilan (Zoom)</h3>
                <div class="scale-controls">
                    <button id="scale-down-btn" class="scale-btn">-</button>
                    <span id="scale-display" class="scale-display">100%</span>
                    <button id="scale-up-btn" class="scale-btn">+</button>
                </div>
            </div>

            <hr class="settings-divider">

            <!-- Backup & Restore -->
            <div class="settings-section">
                <h3>Backup & Restore Data</h3>
                <div style="display: flex; gap: 12px;">
                    <button id="export-btn" class="save-btn" style="background-color: var(--text-secondary); flex: 1; text-align: center; justify-content: center; margin: 0;">Export</button>
                    <button id="load-btn" class="save-btn" style="flex: 1; text-align: center; justify-content: center; margin: 0;">Load</button>
                    <input type="file" id="load-file" accept=".json" style="display: none;">
                </div>
            </div>

            <hr class="settings-divider">

            <!-- Category Manager -->
            <div class="settings-section">
                <h3>Atur Kategori</h3>
                <div class="add-category-box">
                    <input type="text" id="input-new-category" placeholder="Nama Kategori Baru...">
                    <button id="save-category-btn" class="save-btn">Tambah</button>
                </div>
                
                <ul id="category-list" class="category-list">
                    <!-- Daftar Kategori akan di-inject JS -->
                </ul>
            </div>
        </section>
    </main>

    <!-- Application Logic -->
</body>
</html>
